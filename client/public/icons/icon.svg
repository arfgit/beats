<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0518"/>
      <stop offset="100%" stop-color="#2a1657"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff2a6d"/>
      <stop offset="100%" stop-color="#b84dff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <rect x="64" y="196" width="48" height="64" rx="10" fill="#ff2a6d"/>
    <rect x="128" y="196" width="48" height="64" rx="10" fill="none" stroke="#ff2a6d" stroke-width="4"/>
    <rect x="192" y="196" width="48" height="64" rx="10" fill="#ff2a6d"/>
    <rect x="256" y="196" width="48" height="64" rx="10" fill="none" stroke="#ff2a6d" stroke-width="4"/>
    <rect x="320" y="196" width="48" height="64" rx="10" fill="#ff2a6d"/>
    <rect x="384" y="196" width="48" height="64" rx="10" fill="none" stroke="#ff2a6d" stroke-width="4"/>
  </g>
  <path d="M64 300 L448 300" stroke="url(#grid)" stroke-width="2" opacity="0.5"/>
  <g fill="#05d9e8" filter="url(#glow)">
    <circle cx="108" cy="356" r="6"/>
    <circle cx="172" cy="356" r="6"/>
    <circle cx="236" cy="356" r="6"/>
    <circle cx="300" cy="356" r="6"/>
    <circle cx="364" cy="356" r="6"/>
    <circle cx="428" cy="356" r="6"/>
  </g>
  <text x="256" y="440" font-family="JetBrains Mono, monospace" font-size="56" font-weight="700"
